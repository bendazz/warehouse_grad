<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warehouse Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Sports Warehouse</h1>
    <span class="subtitle">Inventory Admin</span>
  </header>

  <main>
    <section class="panel form-panel">
      <div class="panel-header">
        <h2>insert row</h2>
      </div>
      <form id="create-form">
        <input name="name" placeholder="name" required />
        <input name="sport" placeholder="sport" required />
        <input name="category" placeholder="category" required />
        <input name="quantity" type="number" placeholder="quantity" min="0" value="0" required />
        <input name="price" type="number" step="0.01" placeholder="price" min="0" required />
        <input name="supplier" placeholder="supplier" />
        <button type="submit">insert</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>products</h2>
        <span id="row-count" class="row-count"></span>
      </div>
      <div class="table-wrap">
        <table id="inventory-table">
          <thead>
            <tr>
              <th>id</th>
              <th>name</th>
              <th>sport</th>
              <th>category</th>
              <th>quantity</th>
              <th>price</th>
              <th>supplier</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
