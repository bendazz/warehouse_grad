<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warehouse Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Sports Warehouse</h1>
    <span class="subtitle">Inventory Admin</span>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <h2>products</h2>
        <span id="row-count" class="row-count"></span>
      </div>
      <div class="table-wrap">
        <table id="inventory-table">
          <thead>
            <tr>
              <th>id</th>
              <th>name</th>
              <th>sport</th>
              <th>category</th>
              <th>quantity</th>
              <th>price</th>
              <th>supplier</th>
              <th>last_restocked</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
